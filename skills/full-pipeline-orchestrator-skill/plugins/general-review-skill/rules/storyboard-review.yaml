target_files:
  - ep-01/storyboard/p*/storyboard-prompt.md
  - ep-01/director-analysis.md
  - global-assets/character-prompts.md
  - global-assets/scene-prompts.md
check_items:
  - name: 分镜条数匹配
    rule: 分镜数量与导演分析拆镜条数完全一致
    weight: 10
    pass_condition: pXX目录数量与导演分析Pxx数量一致
  - name: 内容合规性
    rule: 每个分镜包含七段式完整结构（画风/镜头/台词/音效/BGM/字幕/备注）
    weight: 10
    pass_condition: 所有分镜都包含七段式完整内容，无缺失
  - name: 与剧本/导演一致性
    rule: 分镜内容与剧本、导演分析完全对齐，无偏离
    weight: 10
    pass_condition: 所有分镜的剧情、镜头、人物出场与导演分析、剧本一致
  - name: 参考图正确
    rule: 分镜引用的参考图都存在且对应正确的人物/场景
    weight: 10
    pass_condition: 所有@图片N引用都对应存在的参考图，描述匹配
  - name: 视频API正文合规
    rule: 「视频API调用正文」仅含@图片N引用与叙事句，无路径/API地址
    weight: 10
    pass_condition: 视频API正文符合格式要求，无非法内容
acceptance:
  min_score: 40
  no_item_below: 6
