target_files:
  - episode/image/*.png
  - global-assets/character-prompts.md
  - global-assets/scene-prompts.md
check_items:
  - name: 生成质量
    rule: 图片清晰，无畸变、无糊脸、无奇怪肢体结构
    weight: 10
    pass_condition: 所有生成图片无明显AI瑕疵
  - name: 与prompt一致性
    rule: 图片内容与对应prompt描述完全匹配
    weight: 10
    pass_condition: 图片的人物、场景、光影、风格与prompt一致
  - name: 风格统一性
    rule: 所有人物/场景图片风格统一，画风一致
    weight: 10
    pass_condition: 所有图片的渲染风格、配色、人物特征保持统一
  - name: 路径合规
    rule: 图片路径符合双轨路径约定，文件名英文可区分集和镜
    weight: 10
    pass_condition: 图片路径、命名符合FLOW_CONTRACT.md约定
acceptance:
  min_score: 32
  no_item_below: 6
