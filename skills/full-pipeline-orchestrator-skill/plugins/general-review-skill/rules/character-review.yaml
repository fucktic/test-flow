target_files:
  - global-assets/character-prompts.md
  - ep-01/director-analysis.md
check_items:
  - name: 人物信息完整性
    rule: 每个人物的外观描述完整、可生成、可区分
    weight: 10
    pass_condition: 所有人物都包含年龄、性格、外貌特征、视觉风格描述
  - name: 与导演分析一致性
    rule: 人物清单与导演分析中的人物清单完全匹配，无遗漏、无冲突
    weight: 10
    pass_condition: 所有导演分析中提到的人物都有对应提示词，描述无矛盾
  - name: 视觉风格统一性
    rule: 所有人物提示词共用同一套视觉规范，与导演整体风格一致
    weight: 10
    pass_condition: 所有人设的画风、渲染风格、配色体系统一
acceptance:
  min_score: 24
  no_item_below: 6
